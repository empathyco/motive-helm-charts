{{- if and .Values.ingress.enabled .Values.ingress.public.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "empathy-service.fullname" . }}-public
  labels:
    {{- include "empathy-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.public.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.public.className }}
  ingressClassName: {{ . | default "public-nlb" }}
  {{- end }}
  {{- with .Values.ingress.public.tls }}
  tls:
    {{- range . }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.public.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "empathy-service.fullname" $ }}
                port:
                  name: {{ .servicePortName | default "http" }}
          {{- end }}
    {{- end }}
{{- end }}
