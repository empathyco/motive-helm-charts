{{- if and .Values.config.enabled (not (empty .Values.config.data)) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "empathy-service.fullname" . }}-config
  labels:
    {{- include "empathy-service.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.config.data | nindent 2 }}
{{- end }}
