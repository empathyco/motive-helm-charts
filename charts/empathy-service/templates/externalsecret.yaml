{{- $hasES := or (.Capabilities.APIVersions.Has "external-secrets.io/v1") (.Capabilities.APIVersions.Has "external-secrets.io/v1beta1") }}
{{- if and (.Values.externalSecrets.enabled | default true) $hasES }}
{{- $api := ternary "external-secrets.io/v1" "external-secrets.io/v1beta1" (.Capabilities.APIVersions.Has "external-secrets.io/v1") }}
{{- range (.Values.externalSecrets.items | default list) }}
{{- $ssr := .secretStoreRef | default dict }}
{{- $target := .target | default dict }}
{{- $targetName := include "empathy-service.externalSecretTargetName" (dict "root" $ "item" .) }}
---
apiVersion: {{ $api }}
kind: ExternalSecret
metadata:
  name: {{ include "empathy-service.fullname" $ }}-{{ .name | required "externalSecrets.items[].name is required" }}
  labels:
    {{- include "empathy-service.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $ssr.name | required "externalSecrets.items[].secretStoreRef.name is required" }}
    kind: {{ $ssr.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $targetName }}
    creationPolicy: {{ $target.creationPolicy | default "Owner" }}
  {{- with .data }}
  data:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with .dataFrom }}
  dataFrom:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
