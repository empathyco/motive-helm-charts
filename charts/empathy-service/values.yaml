  #
  #  - name: latency-native-p99
  #    type: latencyNative
  #    latency: 200ms
  #    nativeMetric: 'http_request_duration_seconds'
  #
  #  - name: probe-up
  #    type: bool
  #    metric: 'probe_success'

# -- Chart-level default env (base layer). Map of KEY: VALUE.
# Intended for values shared across many services via a base/umbrella chart.
# Merged into the <fullname>-env ConfigMap and attached through `envFrom`.
env: {}
#   LOG_LEVEL: info
#   AWS_REGION: eu-west-1

# -- Per-deployment env overrides (top layer). Same shape as `env`; keys here
# override `env`. Intended for the final environment-specific values file
# (e.g. values-prod.yaml). Shares the same <fullname>-env ConfigMap.
extraEnv: {}
#   LOG_LEVEL: debug

# -- Kubernetes-native env list for the main container (supports `valueFrom`).
# Rendered directly into `spec.containers[].env` (via `tpl`), so values may reference
# templates like "{{ .Release.Name }}". `container.env` from `envList` overrides anything from `envFrom`.
envList: []
#  - name: POD_NAME
#    valueFrom:
#      fieldRef:
#        fieldPath: metadata.name
#  - name: DB_PASSWORD
#    valueFrom:
#      secretKeyRef:
#        name: "{{ .Release.Name }}-db"
#        key: password

# -- envFrom entries (configMapRef / secretRef). Rendered through `tpl` so values
# may reference templates. Supports an optional `prefix` per source.
#
# Precedence (later wins within envFrom; `container.env` from `envList` wins over all `envFrom`):
#   1. `envFrom` below (lowest)
#   2. Generated <fullname>-env ConfigMap (from `env` + `extraEnv`)
#   3. External Secrets with `mountAsEnvFrom: true`
#   4. `envList` -> `container.env` (highest; always overrides envFrom)
envFrom: []
#  - configMapRef:
#      name: "{{ .Release.Name }}-extra"
#  - secretRef:
#      name: "{{ .Release.Name }}-legacy"
#    prefix: LEGACY_

# -- External Secrets resources (rendered only if CRDs are installed)
# Per-item template defaults: refreshInterval `1h`, secretStoreRef.kind `ClusterSecretStore`, target.creationPolicy `Owner`.
externalSecrets:
  # -- Master switch (also gated on ESO CRDs being present in the cluster)
  enabled: true
  # -- List of ExternalSecret objects. Only `name` and `secretStoreRef.name` are required.
  items: []
  #  - name: secrets                      # required; used as resource suffix
  #    refreshInterval: 1h                    # optional, default: 1h
  #    secretStoreRef:
  #      name: my-cluster-store               # required
  #      kind: ClusterSecretStore             # optional, default: ClusterSecretStore
  #    target:
  #      name: ""                             # optional; defaults to "<fullname>-<name>"
  #      creationPolicy: Owner                # optional, default: Owner
  #    # Mount the resulting Secret into the Deployment's envFrom automatically
  #    mountAsEnvFrom: false
  #    # Pull the whole remote secret; each property becomes a key
  #    dataFrom:
  #      - extract:
  #          key: /path/to/remote/secret
  #    # And/or map properties one by one
  #    data:
  #      - secretKey: DB_PASSWORD
  #        remoteRef:
  #          key: /path/to/remote/secret
  #          property: db_password

# -- Service account for the workload pod
serviceAccount:
  create: false
  automount: true
  name: ""
  annotations: {}

# -- Pod affinity / anti-affinity (full `spec.template.spec.affinity` object)
affinity: {}

# -- Topology spread constraints (full `spec.template.spec.topologySpreadConstraints` list)
topologySpreadConstraints: []

# -- Node selector for pods
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Pod Disruption Budget
pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# -- Pod-level security context (secure defaults)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# -- Main container security context (secure defaults)
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Network policy (opt-in; no allow-all policy is created when disabled)
networkPolicy:
  enabled: false
  ingressRules: []
  egressRules: []

# -- Minimum time a pod must be ready before counted available
minReadySeconds: 0

# -- How many old ReplicaSets to keep for rollbacks
revisionHistoryLimit: 3

# -- Pod termination grace period
terminationGracePeriodSeconds: 60

# -- Extra init containers
extraInitContainers: []

# -- Extra containers in the pod
extraContainers: []

# -- Extra volumes on the pod
extraVolumes: []

# -- Extra volume mounts on the main container
extraVolumeMounts: []

# -- Extra Kubernetes manifests (YAML objects or strings passed through `tpl`)
extraObjects: []

# -- File-content ConfigMaps. Each item becomes a `<fullname>-content-<nameSuffix>` ConfigMap
# with a single data key (`fileName`). When `autoMount` is true (default) a volume and
# volumeMount are added to the main container automatically.
configMapFromContent: []
#  - nameSuffix: nginx              # required; resource suffix and volume name
#    fileName: nginx.conf           # required; ConfigMap data key + default subPath
#    content: |                     # required; raw file content (multi-line ok)
#      server { listen 8080; }
#    # Mount wiring (set autoMount: false to opt out and manage via extraVolumes/extraVolumeMounts)
#    autoMount: true
#    mountPath: /etc/nginx/nginx.conf  # required when autoMount is true
#    subPath: ""                       # optional; defaults to fileName when mountPath ends with it
#    readOnly: true
#    defaultMode: 0444
