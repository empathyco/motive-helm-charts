# -- Override the chart name (`metadata.name` prefix)
nameOverride: ""

# -- Override the fully qualified release name
fullnameOverride: ""

# -- Number of replicas (ignored when HPA or KEDA autoscaling is enabled)
replicaCount: 1

# -- Image for the main workload container
# @default -- See below
image:
  registry: "500449725748.dkr.ecr.eu-west-1.amazonaws.com"
  repository: docker-hub/nginxinc/nginx-unprivileged
  # -- When empty, defaults to `Chart.AppVersion` (pin a real tag for production images)
  tag: "1.27-alpine"
  digest: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets
imagePullSecrets: []

# -- Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# -- Resource requests/limits for the main container
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 128Mi

# -- Autoscaling: HPA when `autoscaling.enabled` is true, or KEDA when `autoscaling.keda.enabled` is true (mutually exclusive)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""
  scaleUp:
    stabilizationWindowSeconds: 60
    selectPolicy: Max
    policies:
      - type: Pods
        value: 1
        periodSeconds: 60
  scaleDown:
    stabilizationWindowSeconds: 300
    selectPolicy: Min
    policies:
      - type: Pods
        value: 1
        periodSeconds: 300
  keda:
    enabled: false
    pollingInterval: 30
    cooldownPeriod: 300
    triggers: []

# -- Kubernetes Service (ClusterIP / NodePort / LoadBalancer)
service:
  type: ClusterIP
  # -- Primary application port (named `http` on the container and Service)
  port: 8080
  # -- Optional Prometheus/metrics listener port (named `metrics`). `""` or `0` for no separate port; set equal to `port` for metrics on the app port only.
  metricsPort: ""

# -- Ingress: master switch for all Ingress resources (`internal` / `public` only apply when this is true)
ingress:
  enabled: true
  internal:
    enabled: false
    className: internal
    labels: {}
    annotations: {}
    hosts: []
    #  - host: app.internal.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    #        servicePortName: http
    tls: []
  public:
    enabled: false
    className: public-nlb
    labels: {}
    annotations: {}
    hosts: []
    #  - host: app.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    #        servicePortName: http
    tls: []

# -- Gateway API HTTPRoute: master switch for all HTTPRoute resources (`internal` / `public` only apply when this is true)
httpRoutes:
  enabled: true
  internal:
    enabled: false
    annotations: {}
    # -- Gateways this route attaches to (required when enabled)
    parentRef:
      name: internal-envoy-gateway
    # -- Hostnames this route attaches to
    hostnames: []
    # -- Full `rules` list; when empty, a single PathPrefix rule on `defaultPath` â†’ this chart's http service port
    rules: []
    # -- Path for the generated default rule (when `rules` is empty)
    defaultPath: /
  public:
    enabled: false
    annotations: {}
    parentRef:
      name: public-envoy-gateway
    hostnames: []
    rules: []
    defaultPath: /

# -- Probes for the main container
probes:
  enabled: true
  livenessProbe:
    enabled: true
    path: /health
    port: 8080
  readinessProbe:
    enabled: true
    path: /health
    port: 8080
  startupProbe:
    enabled: true
    path: /health
    port: 8080

# -- Prometheus Operator integration
metrics:
  # -- When true, ServiceMonitor scrapes this release's Service. Optionally set `serviceMonitor.port` to a Service port *name* (`http` or `metrics`); when omitted or empty, defaults to `metrics` if a distinct metrics port exists, otherwise `http`.
  serviceMonitor:
    enabled: true
    path: /metrics
    labels:
      release: prometheus

  podMonitor:
    enabled: false
    path: /metrics
    labels:
      release: prometheus

# -- Environment variables for the main container (merged into <fullname>-env ConfigMap)
env: {}
#   LOG_LEVEL: info

# -- Additional env (merged on top of `env`; same ConfigMap; keys here override `env`)
extraEnv: {}

# -- envFrom entries (e.g. `configMapRef` / `secretRef` for secrets created by External Secrets)
envFrom: []

# -- Extra volumes on the pod
extraVolumes: []

# -- Extra volume mounts on the main container
extraVolumeMounts: []

# -- External Secrets resources (rendered only if CRDs are installed)
# Per-item template defaults: refreshInterval `1h`, secretStoreRef.kind `ClusterSecretStore`, target.creationPolicy `Owner`.
externalSecrets:
  # -- Master switch (also gated on ESO CRDs being present in the cluster)
  enabled: true
  # -- List of ExternalSecret objects. Only `name` and `secretStoreRef.name` are required.
  items: []
  #  - name: secrets                      # required; used as resource suffix
  #    refreshInterval: 1h                    # optional, default: 1h
  #    secretStoreRef:
  #      name: my-cluster-store               # required
  #      kind: ClusterSecretStore             # optional, default: ClusterSecretStore
  #    target:
  #      name: ""                             # optional; defaults to "<fullname>-<name>"
  #      creationPolicy: Owner                # optional, default: Owner
  #    # Mount the resulting Secret into the Deployment's envFrom automatically
  #    mountAsEnvFrom: false
  #    # Pull the whole remote secret; each property becomes a key
  #    dataFrom:
  #      - extract:
  #          key: /path/to/remote/secret
  #    # And/or map properties one by one
  #    data:
  #      - secretKey: DB_PASSWORD
  #        remoteRef:
  #          key: /path/to/remote/secret
  #          property: db_password

# -- Service account for the workload pod
serviceAccount:
  create: false
  automount: true
  name: ""
  annotations: {}

# -- Pod affinity / anti-affinity (full `spec.template.spec.affinity` object)
affinity: {}

# -- Topology spread constraints (full `spec.template.spec.topologySpreadConstraints` list)
topologySpreadConstraints: []

# -- Node selector for pods
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Pod Disruption Budget
pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# -- Pod-level security context (secure defaults)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# -- Main container security context (secure defaults)
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Network policy (opt-in; no allow-all policy is created when disabled)
networkPolicy:
  enabled: false
  ingressRules: []
  egressRules: []

# -- Minimum time a pod must be ready before counted available
minReadySeconds: 0

# -- How many old ReplicaSets to keep for rollbacks
revisionHistoryLimit: 3

# -- Pod termination grace period
terminationGracePeriodSeconds: 60

# -- Extra init containers
extraInitContainers: []

# -- Extra containers in the pod
extraContainers: []

# -- Extra Kubernetes manifests (YAML objects or strings passed through `tpl`)
extraObjects: []
