{{- $api := "gateway.networking.k8s.io/v1" -}}
{{- if and .Values.httpRoute.enabled (.Capabilities.APIVersions.Has $api) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ required "httpRoute.name is required" .Values.httpRoute.name }}
  namespace: {{ default .Release.Namespace .Values.httpRoute.namespace }}
  {{- with .Values.httpRoute.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml (required "httpRoute.spec is required" .Values.httpRoute.spec) | nindent 2 }}
{{- end -}}

