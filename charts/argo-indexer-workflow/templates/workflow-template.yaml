apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: {{ .Values.workflowTemplate.name }}
  namespace: {{ .Values.workflowTemplate.namespace }}
spec:
  serviceAccountName: {{ .Values.workflowTemplate.serviceAccountName }}
  entrypoint: process-requests
  parallelism: {{ .Values.workflowTemplate.parallelism }}
  activeDeadlineSeconds: {{ .Values.workflowTemplate.activeDeadlineSeconds }}
  templates:
    - name: process-requests
      steps:
        - - name: fetch-pending
            template: request-handler
        - - name: process-batch
            template: batch-processor
            arguments:
              parameters:
                - name: request
                  value: "{{`{{item}}`}}"
            withParam: "{{`{{steps.fetch-pending.outputs.parameters.requests}}`}}"

    - name: request-handler
      container:
        image: "{{ .Values.requestHandler.image.repository }}:{{ .Values.requestHandler.image.tag }}"
        imagePullPolicy: {{ .Values.requestHandler.image.pullPolicy }}
        command: ["node", "dist/main.js"]
        {{- if .Values.requestHandler.env }}
        env:
          {{- toYaml .Values.requestHandler.env | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.requestHandler.resources | nindent 10 }}
      outputs:
        parameters:
          - name: requests
            valueFrom:
              path: /tmp/requests.json

    - name: batch-processor
      inputs:
        parameters:
          - name: request
      activeDeadlineSeconds: {{ .Values.batchProcessor.activeDeadlineSeconds }}
      container:
        image: "{{ .Values.batchProcessor.image.repository }}:{{ .Values.batchProcessor.image.tag }}"
        imagePullPolicy: {{ .Values.batchProcessor.image.pullPolicy }}
        command: ["node", "dist/main.js"]
        env:
          - name: REQUEST_JSON
            value: "{{`{{inputs.parameters.request}}`}}"
          - name: ARGO_WORKFLOW_NAME
            value: "{{`{{workflow.name}}`}}"
          {{- if .Values.batchProcessor.env }}
          {{- toYaml .Values.batchProcessor.env | nindent 10 }}
          {{- end }}
        resources:
          {{- toYaml .Values.batchProcessor.resources | nindent 10 }}
